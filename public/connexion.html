<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Connexion — EBOK-MERCATO</title>
  <link rel="icon" type="image/png" href="/img/favicon.png" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="site">
    <div class="site-inner">
      <a class="brand" href="/"><img src="/img/logo.svg" alt="EBOK MERCATO" /></a>
      <nav class="main" id="nav"></nav>
    </div>
  </header>

  <main class="container">
    <div class="auth-wrap">
      <div class="card">
        <h1 class="page">Connexion</h1>
        <div id="msg"></div>
        <form id="form">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email" />
          <label for="password">Mot de passe</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" />
          <button class="btn block" type="submit" style="margin-top:20px">Se connecter</button>
        </form>
        <p class="hint" style="margin-top:16px">Pas encore de compte ? <a href="/inscription.html">Créer un compte</a></p>
      </div>
    </div>
  </main>

  <script src="/js/common.js"></script>
  <script type="module" src="/js/pages/connexion.js"></script>
</body>
</html>
