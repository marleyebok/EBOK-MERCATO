<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Créer un compte — EBOK-MERCATO</title>
  <link rel="icon" href="/img/logo.svg" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="site">
    <div class="site-inner">
      <a class="brand" href="/"><img src="/img/logo.svg" alt="EBOK MERCATO" /></a>
      <nav class="main" id="nav"></nav>
    </div>
  </header>

  <main class="container">
    <div class="auth-wrap">
      <div class="card">
        <h1 class="page">Créer un compte</h1>
        <p class="hint">Choisis ton type de compte pour commencer.</p>

        <div id="msg"></div>

        <form id="form">
          <label>Type de compte</label>
          <div class="segmented" id="typeSeg" style="width:100%">
            <button type="button" data-type="membre" class="active" style="flex:1">Joueur / Coach</button>
            <button type="button" data-type="club" style="flex:1">Club / Équipe</button>
          </div>

          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email" />

          <label for="password">Mot de passe <span class="hint">(6 caractères min.)</span></label>
          <input type="password" id="password" name="password" required autocomplete="new-password" />

          <button class="btn block" type="submit" style="margin-top:20px">Créer mon compte</button>
        </form>

        <p class="hint" style="margin-top:16px">Déjà inscrit ? <a href="/connexion.html">Se connecter</a></p>
      </div>
    </div>
  </main>

  <script src="/js/common.js"></script>
  <script>
    renderHeader('inscription');
    let accountType = 'membre';
    const seg = document.getElementById('typeSeg');
    seg.addEventListener('click', (e) => {
      const b = e.target.closest('button'); if (!b) return;
      accountType = b.dataset.type;
      seg.querySelectorAll('button').forEach((x) => x.classList.toggle('active', x === b));
    });

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('msg');
      msg.innerHTML = '';
      try {
        await api('/api/register', {
          method: 'POST',
          body: JSON.stringify({
            email: document.getElementById('email').value.trim(),
            password: document.getElementById('password').value,
            accountType,
          }),
        });
        location.href = '/mon-profil.html';
      } catch (err) {
        msg.innerHTML = `<div class="msg err">${escapeHtml(err.message)}</div>`;
      }
    });
  </script>
</body>
</html>
