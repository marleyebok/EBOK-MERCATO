<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Créer un compte — EBOK-MERCATO</title>
  <link rel="icon" type="image/png" href="/img/favicon.png" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="site">
    <div class="site-inner">
      <a class="brand" href="/"><img src="/img/logo.svg" alt="EBOK MERCATO" /></a>
      <nav class="main" id="nav"></nav>
    </div>
  </header>

  <main class="container">
    <div class="auth-wrap">
      <div class="card">
        <h1 class="page">Créer un compte</h1>
        <p class="hint">Choisis ton type de compte pour commencer.</p>

        <div id="msg"></div>

        <form id="form">
          <label>Type de compte</label>
          <div class="segmented" id="typeSeg" style="width:100%">
            <button type="button" data-type="membre" class="active" style="flex:1">Joueur / Coach</button>
            <button type="button" data-type="club" style="flex:1">Club / Équipe</button>
            <button type="button" data-type="agent" style="flex:1">Agent</button>
          </div>
          <p class="hint" style="margin-top:8px">Un compte <strong>Agent</strong> peut créer et gérer plusieurs fiches de joueurs et discuter avec les clubs en leur nom.</p>

          <div id="nameWrap" style="display:none">
            <label for="displayName">Nom affiché <span class="hint">(nom du club / de l'agence)</span></label>
            <input type="text" id="displayName" />
          </div>

          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="email" />

          <label for="password">Mot de passe <span class="hint">(6 caractères min.)</span></label>
          <input type="password" id="password" name="password" required autocomplete="new-password" />

          <button class="btn block" type="submit" style="margin-top:20px">Créer mon compte</button>
        </form>

        <p class="hint" style="margin-top:16px">Déjà inscrit ? <a href="/connexion.html">Se connecter</a></p>
      </div>
    </div>
  </main>

  <script src="/js/common.js"></script>
  <script type="module" src="/js/pages/inscription.js"></script>
</body>
</html>
